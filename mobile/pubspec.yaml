name: plant_app
description: LeafPal — Premium indoor plant care coach
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.4
  dio: ^5.4.3+1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
