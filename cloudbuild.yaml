# Cloud Build config — uses Artifact Registry (europe-west1)
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/leafpal-backend/api:$COMMIT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/leafpal-backend/api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/leafpal-backend/api'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'leafpal'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/leafpal-backend/api:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/leafpal-backend/api'

options:
  logging: CLOUD_LOGGING_ONLY
