# Cloud Build config — triggered by Cloud Run "Connect to repo"
# Builds the backend Docker image from the /backend subdirectory.
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/leafpal-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/leafpal-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/leafpal-backend'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'leafpal'
      - '--image'
      - 'gcr.io/$PROJECT_ID/leafpal-backend:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/leafpal-backend'

options:
  logging: CLOUD_LOGGING_ONLY
